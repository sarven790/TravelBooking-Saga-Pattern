version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: temporal-postgres
    environment:
      POSTGRES_USER: temporal
      POSTGRES_PASSWORD: temporal
      POSTGRES_DB: temporal
    ports:
      - "5433:5432"
    volumes:
      - temporal_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U temporal -d temporal"]
      interval: 5s
      timeout: 3s
      retries: 20

  temporal:
    image: temporalio/auto-setup:1.24.2
    container_name: temporal
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB: postgres12          # ✅ burası önemli (postgresql değil)
      DB_PORT: 5432
      POSTGRES_USER: temporal
      POSTGRES_PWD: temporal
      POSTGRES_SEEDS: postgres

      TEMPORAL_NAMESPACE: default
      TEMPORAL_ADDRESS: temporal:7233     # ✅ opsiyonel ama iyi
      TEMPORAL_CLI_ADDRESS: temporal:7233 # ✅ healthcheck/tctl için iyi
    ports:
      - "7233:7233"
    healthcheck:
      test: ["CMD", "tctl", "--address", "temporal:7233", "namespace", "list"]
      interval: 10s
      timeout: 5s
      retries: 30

  temporal-ui:
    image: temporalio/ui:2.26.2
    container_name: temporal-ui
    depends_on:
      temporal:
        condition: service_healthy
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_UI_PORT: 8080
    ports:
      - "8080:8080"

  adminer:
    image: adminer:4
    container_name: temporal-adminer
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8081:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres

volumes:
  temporal_pg_data: